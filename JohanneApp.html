<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Johanne sin TV tid</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#08080d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Johanne TV">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #08080d;
  color: white;
  text-align: center;
  padding: 18px;
}

h1 {
  font-size: 34px;
  margin: 10px 0 2px;
}

.subtitle {
  color: #18d4e8;
  font-size: 17px;
  margin-bottom: 18px;
}

.circle {
  width: 320px;
  height: 320px;
  max-width: 90vw;
  max-height: 90vw;
  border-radius: 50%;
  border: 10px solid #38c7ff;
  margin: 20px auto 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #11111a;
  box-shadow: 0 0 28px rgba(56,199,255,0.6);
}

#time {
  font-size: 66px;
  font-weight: bold;
}

button {
  border: none;
  border-radius: 14px;
  padding: 14px 18px;
  margin: 6px;
  font-size: 18px;
  font-weight: bold;
  color: white;
  background: linear-gradient(90deg, #35c7ff, #a65cff);
}

.main {
  width: 90%;
  max-width: 390px;
  font-size: 34px;
  padding: 22px;
  margin: 8px 0 16px;
  border-radius: 25px;
  background: #24c96b;
}

.main.stop {
  background: #ef4444;
}

.row {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin: 6px 0;
}

.row button {
  flex: 1;
  max-width: 120px;
}

.add { background: #24c96b; }
.remove { background: #ef4444; }

.card {
  background: #1f1f2e;
  border: 2px solid #743c91;
  border-radius: 18px;
  padding: 14px;
  margin-top: 18px;
  box-shadow: 0 0 15px rgba(116, 60, 145, 0.4);
}

.card h2 {
  margin-top: 0;
  color: #c77dff;
  font-size: 30px;
}

.task {
  display: grid;
  grid-template-columns: 1fr 80px 50px;
  align-items: center;
  gap: 6px;
  padding: 12px 4px;
  border-bottom: 1px solid #3a3a4a;
  font-size: 22px;
}

.taskName { text-align: left; }

.taskTime {
  color: #18d4e8;
  font-weight: bold;
}

.check {
  width: 32px;
  height: 32px;
}

input, select {
  padding: 13px;
  border-radius: 10px;
  border: none;
  font-size: 18px;
  margin: 5px 0;
}

#newTaskName {
  width: 70%;
}

#newTaskTime {
  width: 25%;
}

.logItem {
  display: grid;
  grid-template-columns: 1.4fr 1fr 70px;
  gap: 6px;
  padding: 9px;
  border-bottom: 1px solid #3a3a4a;
  font-size: 15px;
  align-items: center;
}

.logTask {
  text-align: left;
}

.blue { color: #18d4e8; font-weight: bold; }
.purple { color: #c77dff; font-weight: bold; }

.clearLog {
  background: #ef4444;
  margin-top: 12px;
}
</style>
</head>

<body>

<h1>Johanne sin TV tid</h1>
<div class="subtitle">Jobb – tjen – spar – bruk smart!</div>

<div class="circle">
  <div id="time">00:00</div>
</div>

<button class="main" id="startStopBtn" onclick="toggleTimer()">START</button>

<div class="row">
  <button class="add" onclick="manualAdd(15)">+15</button>
  <button class="add" onclick="manualAdd(30)">+30</button>
  <button class="add" onclick="manualAdd(60)">+60</button>
</div>

<div class="row">
  <button class="remove" onclick="manualRemove(15)">-15</button>
  <button class="remove" onclick="manualRemove(30)">-30</button>
  <button class="remove" onclick="manualRemove(60)">-60</button>
</div>

<button onclick="resetTimer()">Nullstill tid</button>

<div class="card">
  <h2>Oppgaver</h2>
  <div id="taskList"></div>
  <button onclick="resetChecks()">Nullstill avhuking</button>
</div>

<div class="card">
  <h2>Logg</h2>
  <div class="logItem">
    <b>Hva</b>
    <b>Tid</b>
    <b>Igjen</b>
  </div>
  <div id="logList"></div>
  <button class="clearLog" onclick="clearLog()">Slett logg</button>
</div>

<div class="card">
  <h2>Legg til oppgave</h2>
  <input id="newTaskName" placeholder="Oppgave">
  <select id="newTaskTime">
    <option value="15">15</option>
    <option value="30">30</option>
    <option value="60">60</option>
  </select>
  <br>
  <button onclick="addNewTask()">Legg til</button>
</div>

<script>
let time = Number(localStorage.getItem("reward_time")) || 0;
let isRunning = localStorage.getItem("reward_running") === "true";
let lastSaved = Number(localStorage.getItem("reward_lastSaved")) || Date.now();
let interval = null;

let tasks = [
  { name: "Dusj + vaske hår", minutes: 60 },
  { name: "Rydde rommet", minutes: 30 },
  { name: "Gjøre ferdig alle lekser", minutes: 30 },
  { name: "Hive søppel", minutes: 15 },
  { name: "Dekke på bordet", minutes: 15 },
  { name: "Inn/ut oppvaskmaskin", minutes: 30 },
  { name: "Støvsuge 1 rom", minutes: 30 }
];

let checkedTasks = JSON.parse(localStorage.getItem("reward_checked_tasks")) || {};
let logs = JSON.parse(localStorage.getItem("reward_logs")) || [];

if (isRunning) {
  let secondsPassed = Math.floor((Date.now() - lastSaved) / 1000);
  time = Math.max(0, time - secondsPassed);
}

function save() {
  localStorage.setItem("reward_time", time);
  localStorage.setItem("reward_running", isRunning);
  localStorage.setItem("reward_lastSaved", Date.now());
  localStorage.setItem("reward_checked_tasks", JSON.stringify(checkedTasks));
  localStorage.setItem("reward_logs", JSON.stringify(logs));
}

function updateDisplay() {
  let hours = Math.floor(time / 3600);
  let minutes = Math.floor((time % 3600) / 60);
  let seconds = time % 60;

  let display = hours > 0
    ? hours + ":" + String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0")
    : String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");

  let btn = document.getElementById("startStopBtn");
  document.getElementById("time").innerText = display;

  btn.innerText = isRunning ? "STOPP" : "START";
  btn.classList.toggle("stop", isRunning);

  save();
}

function addTime(min, reason) {
  time += min * 60;
  addLog(reason, "+" + min, Math.floor(time / 60));
  updateDisplay();
}

function removeTime(min, reason) {
  time = Math.max(0, time - min * 60);
  addLog(reason, "-" + min, Math.floor(time / 60));
  updateDisplay();
}

function manualAdd(min) {
  addTime(min, "Manuelt lagt til");
}

function manualRemove(min) {
  removeTime(min, "TV-tid brukt/fjernet");
}

function toggleTimer() {
  isRunning ? stopTimer() : startTimer();
}

function startTimer() {
  if (time <= 0) return;

  isRunning = true;
  clearInterval(interval);

  interval = setInterval(() => {
    if (time > 0) {
      time--;
      updateDisplay();
    } else {
      stopTimer();
      alert("Tiden er ute!");
    }
  }, 1000);

  updateDisplay();
}

function stopTimer() {
  isRunning = false;
  clearInterval(interval);
  interval = null;
  updateDisplay();
}

function resetTimer() {
  if (!confirm("Nullstille tiden?")) return;
  stopTimer();
  time = 0;
  addLog("Tiden ble nullstilt", "0", 0);
  updateDisplay();
}

function toggleTask(index, checked) {
  checkedTasks[index] = checked;

  if (checked) {
    let task = tasks[index];
    addTime(task.minutes, task.name);
  }

  save();
}

function resetChecks() {
  if (!confirm("Nullstille avhuking uten å nullstille tiden?")) return;
  checkedTasks = {};
  renderTasks();
  save();
}

function addNewTask() {
  let name = document.getElementById("newTaskName").value.trim();
  let minutes = Number(document.getElementById("newTaskTime").value);

  if (name === "") {
    alert("Skriv navn på oppgaven først.");
    return;
  }

  addTime(minutes, name);
  document.getElementById("newTaskName").value = "";
}

function renderTasks() {
  let list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.forEach((task, index) => {
    let row = document.createElement("div");
    row.className = "task";

    row.innerHTML = `
      <div class="taskName">${task.name}</div>
      <div class="taskTime">${task.minutes}m</div>
      <input class="check" type="checkbox"
        ${checkedTasks[index] ? "checked" : ""}
        onchange="toggleTask(${index}, this.checked)">
    `;

    list.appendChild(row);
  });
}

function addLog(reason, change, left) {
  logs.unshift({
    reason: reason,
    change: change,
    left: left
  });

  logs = logs.slice(0, 20);
  renderLogs();
  save();
}

function renderLogs() {
  let list = document.getElementById("logList");
  list.innerHTML = "";

  logs.forEach(log => {
    let row = document.createElement("div");
    row.className = "logItem";

    row.innerHTML = `
      <div class="logTask">${log.reason}</div>
      <div class="${log.change.startsWith('+') ? 'blue' : 'purple'}">${log.change} min</div>
      <div>${log.left}m</div>
    `;

    list.appendChild(row);
  });
}

function clearLog() {
  if (!confirm("Slette loggen?")) return;
  logs = [];
  renderLogs();
  save();
}

renderTasks();
renderLogs();
updateDisplay();

if (isRunning && time > 0) {
  startTimer();
}

/* PWA */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js");
}
</script>

</body>
</html>
